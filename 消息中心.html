<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>消息中心</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#fff;--bg2:#f7f7f5;--bg3:#f0efe9;
  --t1:#1a1a18;--t2:#5a5a56;--t3:#9a9a94;
  --bd:rgba(0,0,0,0.09);--bd2:rgba(0,0,0,0.15);
  --blue:#185FA5;--blue-bg:#E6F1FB;--blue-t:#0C447C;
  --red:#E24B4A;--red-bg:#FCEBEB;--red-t:#A32D2D;
  --orange:#EF9F27;--orange-bg:#FAEEDA;--orange-t:#854F0B;
  --green:#1D9E75;--green-bg:#E1F5EE;--green-t:#0F6E56;
  --purple:#7F77DD;--purple-bg:#EEEDFE;--purple-t:#534AB7;
  --coral:#C4511E;--coral-bg:#FAECE7;
  --r4:4px;--r6:6px;--r8:8px;
}
body{font-family:'PingFang SC','Microsoft YaHei',sans-serif;font-size:13px;color:var(--t1);background:var(--bg);height:100vh;overflow:hidden}
.hide{display:none!important}

/* ════ App shell ════ */
.app{display:flex;height:100vh;overflow:hidden}

/* ════ Main sidebar — 3 items only ════ */
.sidebar{
  width:148px;flex-shrink:0;
  border-right:1px solid var(--bd);
  display:flex;flex-direction:column;
  background:var(--bg2);
}
.sb-head{
  padding:13px 14px 11px;font-size:13.5px;font-weight:700;color:var(--t1);
  border-bottom:1px solid var(--bd);flex-shrink:0;
  display:flex;align-items:center;gap:6px;letter-spacing:.01em;
}
.sbm{
  display:flex;align-items:center;gap:7px;
  padding:10px 14px;cursor:pointer;
  font-size:12.5px;font-weight:500;color:var(--t2);
  transition:background .1s,color .1s;position:relative;user-select:none;
}
.sbm:hover{background:var(--bg3);color:var(--t1)}
.sbm.active{color:var(--t1);font-weight:600;background:var(--bg3)}
.sbm.active::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--t1);border-radius:0 2px 2px 0}
.sbm-ico{font-size:13px;width:16px;text-align:center;flex-shrink:0}
.sbm-name{flex:1;line-height:1.35}
.sbm-badge{font-size:10px;font-weight:700;padding:1px 5px;border-radius:20px;min-width:17px;text-align:center;flex-shrink:0}
.badge-r{background:var(--red-bg);color:var(--red-t)}
.badge-o{background:var(--orange-bg);color:var(--orange-t)}
.sb-spacer{flex:1}
.sb-ver{font-size:10.5px;color:var(--t3);padding:10px 14px;line-height:1.4}

/* ════ Content wrap ════ */
.cwrap{flex:1;display:flex;overflow:hidden;min-width:0}

/* ════ Inner sub-nav (inside cwrap) ════ */
.innav{
  width:160px;flex-shrink:0;
  border-right:1px solid var(--bd);
  display:flex;flex-direction:column;
  background:var(--bg);overflow-y:auto;
}
.innav.hide{display:none}
.innav::-webkit-scrollbar{width:3px}
.innav::-webkit-scrollbar-thumb{background:var(--bd2);border-radius:2px}
.innav-head{
  padding:11px 14px 8px;font-size:10.5px;font-weight:700;
  color:var(--t3);letter-spacing:.06em;text-transform:uppercase;
  border-bottom:1px solid var(--bd);flex-shrink:0;
}
.ingrp{padding:9px 14px 3px;font-size:10px;font-weight:700;color:var(--t3);letter-spacing:.06em;text-transform:uppercase}
.ini{
  display:flex;align-items:center;
  padding:6px 14px 6px 20px;cursor:pointer;
  font-size:12px;color:var(--t2);
  transition:background .1s,color .1s;position:relative;line-height:1.4;
}
.ini:hover{background:var(--bg2);color:var(--t1)}
.ini.active{color:var(--blue);font-weight:600;background:var(--blue-bg)}
.ini.active::before{content:'';position:absolute;left:0;top:3px;bottom:3px;width:2.5px;background:var(--blue);border-radius:0 2px 2px 0}
.ini-all{padding-left:14px;font-size:12.5px;font-weight:600}
.ini-cnt{margin-left:auto;font-size:10.5px;font-weight:600;color:var(--t3);min-width:14px;text-align:right;flex-shrink:0}
.ini-cnt.r{color:var(--red-t)}
.ini-cnt.o{color:var(--orange-t)}
.innav-div{height:1px;background:var(--bd);margin:4px 12px}

/* ════ Panels ════ */
.mpanel{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}
.mpanel.hide{display:none}

/* ════ Toolbar ════ */
.toolbar{
  display:flex;align-items:center;gap:7px;
  padding:8px 12px;border-bottom:1px solid var(--bd);
  flex-shrink:0;background:var(--bg);
}
.search{
  flex:1;height:29px;
  border:1px solid var(--bd2);border-radius:var(--r6);
  padding:0 10px;font-size:12px;color:var(--t1);
  background:var(--bg2);outline:none;font-family:inherit;min-width:0;
}
.search::placeholder{color:var(--t3)}
.search:focus{border-color:var(--blue);background:#fff}
.fbtn{
  height:27px;padding:0 9px;
  border:1px solid var(--bd2);border-radius:var(--r6);
  font-size:11.5px;font-weight:500;background:#fff;color:var(--t2);
  cursor:pointer;font-family:inherit;white-space:nowrap;transition:all .1s;
}
.fbtn:hover{border-color:var(--blue);color:var(--blue)}
.fbtn.on{background:var(--blue-bg);border-color:rgba(24,95,165,.35);color:var(--blue-t);font-weight:600}
.fbtn-txt{border:none;background:none;color:var(--t3);font-size:11.5px;cursor:pointer;font-family:inherit;padding:0 3px;transition:color .1s;white-space:nowrap}
.fbtn-txt:hover{color:var(--t1)}

/* ════ Message list ════ */
.list-wrap{flex:1;overflow-y:auto}
.list-wrap::-webkit-scrollbar{width:4px}
.list-wrap::-webkit-scrollbar-thumb{background:var(--bd2);border-radius:2px}
.list-inner{padding:4px 10px}

.mcard{
  display:flex;gap:8px;
  padding:9px 10px 9px 8px;
  border-bottom:1px solid var(--bd);
  cursor:pointer;background:#fff;transition:background .1s;
}
.mcard:last-child{border-bottom:none}
.mcard:hover{background:#fafaf8}
.mcard.sel{background:var(--blue-bg)}
.mcard-strip{width:3px;border-radius:2px;flex-shrink:0;align-self:stretch;margin-top:2px}
.sh{background:var(--red)}.sm{background:var(--orange)}.sl{background:var(--blue)}.sn_{background:var(--bd2)}
.mcard-ico{width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;flex-shrink:0;margin-top:1px}
.ico-ent{background:var(--blue-bg)}.ico-comp{background:var(--orange-bg)}.ico-pub{background:var(--coral-bg)}.ico-pol{background:var(--green-bg)}
.mcard-body{flex:1;min-width:0}
.mcard-top{display:flex;align-items:flex-start;gap:5px;margin-bottom:2px}
.mcard-title{font-size:12px;font-weight:600;color:var(--t1);flex:1;line-height:1.4;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.mcard.sel .mcard-title{color:var(--blue-t)}
.mcard-time{font-size:10.5px;color:var(--t3);white-space:nowrap;flex-shrink:0;margin-top:1px}
.udot{width:6px;height:6px;border-radius:50%;background:var(--blue);flex-shrink:0;margin-top:3px}
.mcard-catrow{margin-bottom:3px}
.mcard-sum{font-size:11.5px;color:var(--t2);line-height:1.5;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;margin-bottom:4px}
.mtags{display:flex;gap:4px;flex-wrap:wrap}
.list-foot{
  height:33px;display:flex;align-items:center;
  padding:0 12px;border-top:1px solid var(--bd);
  flex-shrink:0;background:var(--bg2);gap:14px;
}
.stat{font-size:11.5px;color:var(--t2)}
.stat b{font-weight:600;color:var(--t1)}
.stat-r b{color:var(--red)}
.lempty{padding:44px 16px;text-align:center;color:var(--t3);font-size:12.5px}

/* Tags */
.tag{display:inline-flex;align-items:center;padding:1px 6px;border-radius:3px;font-size:10.5px;font-weight:600;white-space:nowrap}
.tag-r{background:var(--red-bg);color:var(--red-t)}
.tag-o{background:var(--orange-bg);color:var(--orange-t)}
.tag-b{background:var(--blue-bg);color:var(--blue-t)}
.tag-g{background:var(--green-bg);color:var(--green-t)}
.tag-p{background:var(--purple-bg);color:var(--purple-t)}
.tag-c{background:var(--coral-bg);color:var(--coral)}
.tag-gray{background:var(--bg3);color:var(--t3)}
.ctag-ent{background:var(--blue-bg);color:var(--blue-t)}
.ctag-comp{background:var(--orange-bg);color:var(--orange-t)}
.ctag-pub{background:var(--coral-bg);color:var(--coral)}
.ctag-pol{background:var(--green-bg);color:var(--green-t)}
.urg-h{background:var(--red-bg);color:var(--red-t)}
.urg-m{background:var(--orange-bg);color:var(--orange-t)}
.urg-l{background:var(--green-bg);color:var(--green-t)}

/* ════ Detail panel ════ */
.dpanel{
  width:320px;flex-shrink:0;
  border-left:1px solid var(--bd);
  display:flex;flex-direction:column;overflow:hidden;background:#fff;
}
.dpanel.hide{display:none}
.dp-empty{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;color:var(--t3);font-size:12.5px;gap:10px}
.dp-empty-ico{font-size:34px;opacity:.2}
.dp-inner{display:flex;flex-direction:column;height:100%;overflow:hidden}
.dp-inner.hide{display:none}
.dp-scroll{flex:1;overflow-y:auto}
.dp-scroll::-webkit-scrollbar{width:3px}
.dp-scroll::-webkit-scrollbar-thumb{background:var(--bd2);border-radius:2px}
.dp-head{padding:13px 15px 11px;border-bottom:1px solid var(--bd)}
.dp-metarow{display:flex;align-items:center;gap:5px;margin-bottom:7px;flex-wrap:wrap}
.dp-title{font-size:13.5px;font-weight:700;color:var(--t1);line-height:1.45;margin-bottom:6px}
.dp-time{font-size:11px;color:var(--t3)}
.dp-sec{padding:10px 15px;border-bottom:1px solid var(--bd)}
.dp-lbl{font-size:10px;font-weight:700;color:var(--t3);letter-spacing:.06em;text-transform:uppercase;margin-bottom:6px}
.dp-text{font-size:12.5px;color:var(--t2);line-height:1.65}
.dp-grid{display:grid;grid-template-columns:1fr 1fr;gap:5px;margin-top:3px}
.dp-cell{background:var(--bg2);border-radius:var(--r6);padding:7px 9px;border:1px solid var(--bd)}
.dp-cl{font-size:10px;color:var(--t3);margin-bottom:2px}
.dp-cv{font-size:12.5px;font-weight:700;color:var(--t1)}
.dp-advice{font-size:12px;color:var(--t2);line-height:1.65;background:var(--orange-bg);border-radius:var(--r6);padding:9px 11px;border-left:3px solid var(--orange)}
.dp-actions{padding:10px 13px;display:flex;gap:6px;flex-shrink:0;border-top:1px solid var(--bd)}
.abtn{flex:1;height:32px;border-radius:var(--r6);font-size:12px;cursor:pointer;font-weight:600;font-family:inherit;transition:all .15s}
.abtn-p{background:var(--blue);color:#fff;border:none}
.abtn-p:hover{background:var(--blue-t)}
.abtn-s{background:#fff;color:var(--t2);border:1px solid var(--bd2)}
.abtn-s:hover{background:var(--bg2)}

/* ════ Subscription settings ════ */
.sub-wrap{flex:1;overflow-y:auto;background:var(--bg)}
.sub-wrap::-webkit-scrollbar{width:4px}
.sub-wrap::-webkit-scrollbar-thumb{background:var(--bd2);border-radius:2px}
.sub-head{padding:16px 22px 12px;border-bottom:1px solid var(--bd)}
.sub-head-t{font-size:15px;font-weight:700;color:var(--t1);margin-bottom:4px}
.sub-head-s{font-size:12px;color:var(--t3);line-height:1.6}
.sub-notice{margin:13px 22px 0;padding:9px 12px;font-size:12px;color:var(--blue-t);background:var(--blue-bg);border-radius:var(--r6);border-left:3px solid var(--blue);line-height:1.6}
.sub-grp{margin:13px 22px 0;border:1px solid var(--bd);border-radius:var(--r8);overflow:hidden}
.sub-grp-head{padding:9px 14px;background:var(--bg2);border-bottom:1px solid var(--bd);display:flex;align-items:center;gap:8px;font-size:12.5px;font-weight:700;color:var(--t1)}
.sub-grp-ico{font-size:13px;width:18px;text-align:center}
.sub-row{display:flex;align-items:center;padding:10px 14px;border-bottom:1px solid var(--bd);gap:10px;background:#fff}
.sub-row:last-child{border-bottom:none}
.sub-row-info{flex:1;min-width:0}
.sub-row-name{font-size:12.5px;color:var(--t1);font-weight:500}
.sub-row-desc{font-size:11px;color:var(--t3);margin-top:2px;line-height:1.4}
.sw{position:relative;width:36px;height:20px;flex-shrink:0}
.sw input{opacity:0;width:0;height:0;position:absolute}
.sw-sl{position:absolute;inset:0;background:#d0d0cc;border-radius:20px;cursor:pointer;transition:background .2s}
.sw-sl::before{content:'';position:absolute;width:16px;height:16px;border-radius:50%;background:#fff;left:2px;top:2px;transition:transform .2s;box-shadow:0 1px 3px rgba(0,0,0,.2)}
.sw input:checked+.sw-sl{background:var(--blue)}
.sw input:checked+.sw-sl::before{transform:translateX(16px)}
.freq-g{display:flex;flex-shrink:0}
.freq-b{padding:3px 9px;font-size:11px;font-weight:500;border:1px solid var(--bd2);background:#fff;color:var(--t3);cursor:pointer;font-family:inherit;transition:all .1s;white-space:nowrap}
.freq-b:first-child{border-radius:var(--r4) 0 0 var(--r4)}
.freq-b:last-child{border-radius:0 var(--r4) var(--r4) 0}
.freq-b:not(:first-child){border-left:none}
.freq-b.on{background:var(--blue-bg);border-color:rgba(24,95,165,.4);color:var(--blue-t);font-weight:700;z-index:1}
.freq-b:hover:not(.on):not(.dis){color:var(--t1)}
.freq-b.dis{pointer-events:none;opacity:.35}
.sub-save-row{padding:14px 22px 20px;display:flex;justify-content:flex-end}
.save-btn{padding:7px 20px;border-radius:var(--r6);background:var(--t1);color:#fff;border:none;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;transition:background .15s}
.save-btn:hover{background:#333}

/* ════ Task panel ════ */
.task-toolbar{display:flex;align-items:center;gap:8px;padding:9px 12px;border-bottom:1px solid var(--bd);flex-shrink:0;background:var(--bg)}
.task-toolbar-t{font-size:13px;font-weight:700;color:var(--t1)}
.task-stat{font-size:11.5px;color:var(--t3);margin-left:auto}
.tcard{display:flex;gap:9px;padding:11px 12px;border-bottom:1px solid var(--bd);cursor:pointer;background:#fff;transition:background .1s}
.tcard:last-child{border-bottom:none}
.tcard:hover{background:#fafaf8}
.tcard.sel{background:var(--blue-bg)}
.tcard-body{flex:1;min-width:0}
.tcard-top{display:flex;align-items:center;gap:5px;margin-bottom:5px;flex-wrap:wrap}
.ttype-b{font-size:10.5px;padding:2px 6px;border-radius:3px;font-weight:600;white-space:nowrap}
.turg{font-size:10.5px;padding:1px 5px;border-radius:3px;font-weight:600;white-space:nowrap}
.tnew{font-size:10px;padding:1px 5px;border-radius:3px;font-weight:700;background:var(--purple-bg);color:var(--purple-t)}
.tcard-title{font-size:12px;font-weight:600;color:var(--t1);line-height:1.4;margin-bottom:4px}
.tcard.sel .tcard-title{color:var(--blue-t)}
.tcard-meta{font-size:11px;color:var(--t3);display:flex;gap:9px;flex-wrap:wrap}
.tcard-r{display:flex;flex-direction:column;align-items:flex-end;gap:5px;flex-shrink:0}
.ttime{font-size:10.5px;color:var(--t3);white-space:nowrap}
.tnewdot{width:6px;height:6px;border-radius:50%;background:var(--orange)}
.tt-approval{background:var(--purple-bg);color:var(--purple-t)}
.tt-complaint{background:var(--red-bg);color:var(--red-t)}
.tt-brief{background:var(--orange-bg);color:var(--orange-t)}
.tt-report{background:var(--blue-bg);color:var(--blue-t)}
.goto-btn{width:100%;height:37px;border-radius:var(--r8);background:var(--blue);color:#fff;border:none;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;display:flex;align-items:center;justify-content:center;gap:5px;transition:background .15s;letter-spacing:.02em}
.goto-btn:hover{background:var(--blue-t)}
.goto-hint{font-size:11px;color:var(--t3);text-align:center;margin-top:5px}
</style>
</head>
<body>
<div class="app">

<!-- ══ Main sidebar: 3 items only ══ -->
<div class="sidebar">
  <div class="sb-head">📬 消息中心</div>
  <div class="sbm active" id="sbm-msg" onclick="goSec('msg')">
    <span class="sbm-ico">🔔</span>
    <span class="sbm-name">消息提醒</span>
    <span class="sbm-badge badge-r" id="badge-msg">8</span>
  </div>
  <div class="sbm" id="sbm-sub" onclick="goSec('sub')">
    <span class="sbm-ico">⚙</span>
    <span class="sbm-name">消息订阅设置</span>
  </div>
  <div class="sbm" id="sbm-task" onclick="goSec('task')">
    <span class="sbm-ico">📋</span>
    <span class="sbm-name">待处理任务提醒</span>
    <span class="sbm-badge badge-o" id="badge-task">4</span>
  </div>
  <div class="sb-spacer"></div>
  <div class="sb-ver">站内信消息中心</div>
</div>

<!-- ══ Content wrap ══ -->
<div class="cwrap">

  <!-- ── Inner sub-nav (sub-categories) ── -->
  <div class="innav" id="innav">

    <!-- 消息分类 (shown when msg active) -->
    <div id="innav-msg">
      <div class="innav-head">消息分类</div>
      <div class="ini ini-all active" id="ini-all" onclick="fMsg('all',this)">全部消息<span class="ini-cnt r" id="cnt-all">8</span></div>
      <div class="innav-div"></div>
      <div class="ingrp">监控企业</div>
      <div class="ini" id="ini-ent-watch" onclick="fMsg('ent-watch',this)">企业监控<span class="ini-cnt" id="cnt-ent-watch">2</span></div>
      <div class="ini" id="ini-tm-warn" onclick="fMsg('tm-warn',this)">商标预警监控<span class="ini-cnt" id="cnt-tm-warn">1</span></div>
      <div class="ingrp">竞对动态预警</div>
      <div class="ini" id="ini-comp-pub" onclick="fMsg('comp-pub',this)">舆情动态<span class="ini-cnt" id="cnt-comp-pub">0</span></div>
      <div class="ini" id="ini-comp-biz" onclick="fMsg('comp-biz',this)">工商变更<span class="ini-cnt" id="cnt-comp-biz">1</span></div>
      <div class="ini" id="ini-comp-bid" onclick="fMsg('comp-bid',this)">招投标动态<span class="ini-cnt" id="cnt-comp-bid">1</span></div>
      <div class="ini" id="ini-comp-pat" onclick="fMsg('comp-pat',this)">专利发布<span class="ini-cnt" id="cnt-comp-pat">1</span></div>
      <div class="ingrp">舆情监控</div>
      <div class="ini" id="ini-pub-warn" onclick="fMsg('pub-warn',this)">舆情预警<span class="ini-cnt" id="cnt-pub-warn">2</span></div>
      <div class="ini" id="ini-pub-opp" onclick="fMsg('pub-opp',this)">行业机遇<span class="ini-cnt" id="cnt-pub-opp">0</span></div>
      <div class="ingrp">政策发布提醒</div>
      <div class="ini" id="ini-policy" onclick="fMsg('policy',this)">政策发布<span class="ini-cnt" id="cnt-policy">0</span></div>
    </div>

    <!-- 任务类型 (shown when task active) -->
    <div id="innav-task" class="hide">
      <div class="innav-head">任务类型</div>
      <div class="ini ini-all active" id="ini-task-all" onclick="fTask('all',this)">全部任务<span class="ini-cnt o" id="tcnt-all">4</span></div>
      <div class="innav-div"></div>
      <div class="ini" id="ini-task-approval" onclick="fTask('approval',this)">需求审批<span class="ini-cnt" id="tcnt-approval">1</span></div>
      <div class="ini" id="ini-task-complaint" onclick="fTask('complaint',this)">客诉反馈处理<span class="ini-cnt" id="tcnt-complaint">1</span></div>
      <div class="ini" id="ini-task-brief" onclick="fTask('brief',this)">简报变更申请<span class="ini-cnt" id="tcnt-brief">1</span></div>
      <div class="ini" id="ini-task-report" onclick="fTask('report',this)">报告变更提醒<span class="ini-cnt" id="tcnt-report">1</span></div>
    </div>

  </div><!-- /innav -->

  <!-- ── 消息提醒 panel ── -->
  <div class="mpanel" id="panel-msg">
    <div class="toolbar">
      <input class="search" id="msg-search" placeholder="搜索消息…" oninput="renderMsg()"/>

let curSec='msg',curMCat='all',curTType='all',selMid=null,selTid=null;
let mFilters={unread:true,high:false};
const URGMAP={high:{l:'高优先级',cls:'urg-h'},mid:{l:'中优先级',cls:'urg-m'},low:{l:'低优先级',cls:'urg-l'}};
const TURGMAP={high:{l:'紧急',cls:'urg-h'},mid:{l:'一般',cls:'urg-m'},low:{l:'普通',cls:'urg-l'}};

/* ═══════════════════════════
   SECTION SWITCH
═══════════════════════════ */
function goSec(sec){
  curSec=sec;
  ['msg','sub','task'].forEach(s=>{
    document.getElementById('sbm-'+s).classList.toggle('active',s===sec);
    document.getElementById('panel-'+s).classList.toggle('hide',s!==sec);
  });
  // Inner nav: hide for sub, show for msg/task
  const innav=document.getElementById('innav');
  innav.classList.toggle('hide',sec==='sub');
  document.getElementById('innav-msg').classList.toggle('hide',sec!=='msg');
  document.getElementById('innav-task').classList.toggle('hide',sec!=='task');
  // Detail panels
  document.getElementById('dpanel-msg').classList.toggle('hide',sec!=='msg');
  document.getElementById('dpanel-task').classList.toggle('hide',sec!=='task');
  if(sec==='msg') renderMsg();
  if(sec==='sub') renderSub();
  if(sec==='task') renderTask();
}

/* ═══════════════════════════
   MESSAGES
═══════════════════════════ */
function fMsg(cat,el){
  curMCat=cat;selMid=null;
  document.querySelectorAll('#innav-msg .ini').forEach(e=>e.classList.remove('active'));
  if(el)el.classList.add('active');
  renderMsg();resetMsgDetail();
}

function toggleF(k,btn){
  mFilters[k]=!mFilters[k];
  btn.classList.toggle('on',mFilters[k]);
  renderMsg();
}

function getMsgs(){
  const q=(document.getElementById('msg-search')?.value||'').trim().toLowerCase();
  return MSGS.filter(m=>{
    if(curMCat!=='all'&&m.cat!==curMCat) return false;
    if(mFilters.unread&&!m.unread) return false;
    if(mFilters.high&&m.urg!=='high') return false;
    if(q&&!m.title.toLowerCase().includes(q)&&!m.sum.toLowerCase().includes(q)) return false;
    return true;
  });
}

function renderMsg(){
  const list=getMsgs();
  const unreadAll=MSGS.filter(m=>m.unread).length;
  document.getElementById('msg-cnt').textContent=list.length;
  document.getElementById('msg-unread').textContent=unreadAll;
  const el=document.getElementById('msg-list');
  if(!list.length){el.innerHTML='<div class="lempty">暂无匹配消息</div>';return;}
  el.innerHTML=list.map(m=>{
    const sc=m.urg==='high'?'sh':m.urg==='mid'?'sm':'sl';
    const th=m.tags.map(t=>`<span class="tag tag-${t.c}">${t.l}</span>`).join('');
    return`<div class="mcard${selMid===m.id?' sel':''}${m.unread?' unread':''}" onclick="selMsg('${m.id}')">
      <div class="mcard-strip ${sc}"></div>
      <div class="mcard-ico ${m.icoCls}">${m.ico}</div>
      <div class="mcard-body">
        <div class="mcard-top">
          <div class="mcard-title">${m.title}</div>
          ${m.unread?'<div class="udot"></div>':''}
          <div class="mcard-time">${m.time}</div>
        </div>
        <div class="mcard-catrow"><span class="tag ${m.ctag}" style="font-size:10px">${m.catN}</span></div>
        <div class="mcard-sum">${m.sum}</div>
        <div class="mtags">${th}</div>
      </div>
    </div>`;
  }).join('');
}

function selMsg(id){
  selMid=id;
  const m=MSGS.find(x=>x.id===id);if(!m)return;
  m.unread=false;
  renderMsg();showMsgDetail(m);updateBadges();
}

function resetMsgDetail(){
  document.getElementById('dp-empty-msg').classList.remove('hide');
  document.getElementById('dp-msg').classList.add('hide');
}

function showMsgDetail(m){
  document.getElementById('dp-empty-msg').classList.add('hide');
  const dc=document.getElementById('dp-msg');
  dc.classList.remove('hide');
  const urg=URGMAP[m.urg]||URGMAP.low;
  const det=m.det||{};
  dc.innerHTML=`
  <div class="dp-scroll">
    <div class="dp-head">
      <div class="dp-metarow"><span class="tag ${m.ctag}">${m.catN}</span><span class="tag ${urg.cls}">${urg.l}</span></div>
      <div class="dp-title">${m.title}</div>
      <div class="dp-time">📅 ${m.timeX}&nbsp;·&nbsp;站内信</div>
    </div>
    ${det.desc?`<div class="dp-sec"><div class="dp-text">${det.desc}</div></div>`:''}
  </div>
  <div class="dp-actions">
    <button class="abtn abtn-s" onclick="removeMsg('${m.id}')">归档</button>
    <button class="abtn abtn-s" onclick="removeMsg('${m.id}')">删除</button>
  </div>`;
  dc.querySelector('.dp-scroll').scrollTop=0;
}

function removeMsg(id){
  const i=MSGS.findIndex(m=>m.id===id);
  if(i>=0)MSGS.splice(i,1);
  selMid=null;resetMsgDetail();renderMsg();updateBadges();
}

function markAllRead(){
  MSGS.forEach(m=>m.unread=false);
  renderMsg();updateBadges();
}

function updateBadges(){
  const cats=['ent-watch','tm-warn','comp-pub','comp-biz','comp-bid','comp-pat','pub-warn','pub-opp','policy'];
  const total=MSGS.filter(m=>m.unread).length;
  const badge=document.getElementById('badge-msg');
  badge.textContent=total;badge.style.display=total?'':'none';
  const ca=document.getElementById('cnt-all');
  ca.textContent=total;ca.className='ini-cnt'+(total?' r':'');
  cats.forEach(c=>{
    const el=document.getElementById('cnt-'+c);
    if(el)el.textContent=MSGS.filter(m=>m.cat===c&&m.unread).length;
  });
}

/* ═══════════════════════════
   TASKS
═══════════════════════════ */
function fTask(type,el){
  curTType=type;selTid=null;
  document.querySelectorAll('#innav-task .ini').forEach(e=>e.classList.remove('active'));
  if(el)el.classList.add('active');
  renderTask();resetTaskDetail();
}

function getTasks(){
  return curTType==='all'?TASKS:TASKS.filter(t=>t.type===curTType);
}

function renderTask(){
  const list=getTasks();
  document.getElementById('task-stat').textContent=`共 ${TASKS.length} 项待处理`;
  const el=document.getElementById('task-list');
  if(!list.length){el.innerHTML='<div class="lempty">暂无待处理任务</div>';return;}
  const um={high:{l:'紧急',cls:'urg-h'},mid:{l:'一般',cls:'urg-m'},low:{l:'普通',cls:'urg-l'}};
  el.innerHTML=list.map(t=>{
    const u=um[t.urg]||um.low;
    return`<div class="tcard${selTid===t.id?' sel':''}" onclick="selTask('${t.id}')">
      <div class="tcard-body">
        <div class="tcard-top">
          <span class="ttype-b ${t.typeCls}">${t.typeN}</span>
          <span class="turg ${u.cls}">${u.l}</span>
          ${t.isNew?'<span class="tnew">新</span>':''}
        </div>
        <div class="tcard-title">${t.title}</div>
        <div class="tcard-meta"><span>提交：${t.submitter}</span><span>截止：${t.deadline}</span></div>
      </div>
      <div class="tcard-r">
        <div class="ttime">${t.createTime.slice(0,10)}</div>
        ${t.isNew?'<div class="tnewdot"></div>':''}
      </div>
    </div>`;
  }).join('');
}

function selTask(id){
  selTid=id;
  const t=TASKS.find(x=>x.id===id);if(!t)return;
  renderTask();showTaskDetail(t);
}

function resetTaskDetail(){
  document.getElementById('dp-empty-task').classList.remove('hide');
  document.getElementById('dp-task').classList.add('hide');
}

function showTaskDetail(t){
  document.getElementById('dp-empty-task').classList.add('hide');
  const dc=document.getElementById('dp-task');
  dc.classList.remove('hide');
  const u=TURGMAP[t.urg]||TURGMAP.low;
  const dh=(t.data||[]).map(d=>`<div class="dp-cell"><div class="dp-cl">${d.l}</div><div class="dp-cv">${d.v}</div></div>`).join('');
  dc.innerHTML=`
  <div class="dp-scroll">
    <div class="dp-head">
      <div class="dp-metarow"><span class="ttype-b ${t.typeCls}">${t.typeN}</span><span class="turg ${u.cls}">${u.l}</span></div>
      <div class="dp-title" style="margin-top:7px">${t.title}</div>
      <div class="dp-time">📅 ${t.createTime}&nbsp;·&nbsp;站内信</div>
    </div>
    ${dh?`<div class="dp-sec"><div class="dp-lbl">任务详情</div><div class="dp-grid">${dh}</div></div>`:''}
    <div class="dp-sec">
      <div class="dp-lbl">处理页面</div>
      <div class="dp-text" style="color:var(--blue);font-weight:500">📍 ${t.targetPage}</div>
    </div>
    <div class="dp-sec" style="background:var(--orange-bg);border-color:transparent;border-radius:0">
      <div style="font-size:11.5px;color:var(--orange-t);line-height:1.55">⚠ 此任务须在对应功能页面中完成处理，无法在消息中心内操作。</div>
    </div>
  </div>
  <div class="dp-actions" style="flex-direction:column;gap:5px">
    <button class="goto-btn" onclick="alert('正在跳转至：${t.targetPage}')">前往处理 →</button>
    <div class="goto-hint">跳转至「${t.targetPage}」完成处理</div>
  </div>`;
  dc.querySelector('.dp-scroll').scrollTop=0;
}

/* ═══════════════════════════
   SUBSCRIPTION SETTINGS
═══════════════════════════ */
function renderSub(){
  const FREQS=[{k:'realtime',l:'实时'},{k:'hourly',l:'整点'},{k:'daily',l:'定时'}];
  let h=`
  <div class="sub-head">
    <div class="sub-head-t">消息订阅设置</div>
    <div class="sub-head-s">管理各类消息的接收开关与提醒频次，所有消息均通过<b>站内信</b>方式推送。</div>
  </div>
  <div class="sub-notice">📬 消息接收方式固定为<b>站内信</b>。可对各子类消息单独开启 / 关闭，并设置推送频次：<b>实时</b>（即时推送）、<b>整点</b>（每小时整点推送）、<b>定时</b>（每日定时推送）。</div>`;
  SUB.forEach(g=>{
    h+=`<div class="sub-grp">
      <div class="sub-grp-head"><span class="sub-grp-ico">${g.ico}</span>${g.group}</div>`;
    g.items.forEach(it=>{
      const fb=FREQS.map(f=>`<button class="freq-b${it.freq===f.k?' on':''}${!it.en?' dis':''}" onclick="setFreq('${it.key}','${f.k}',this)">${f.l}</button>`).join('');
      h+=`<div class="sub-row">
        <div class="sub-row-info">
          <div class="sub-row-name">${it.name}</div>
          <div class="sub-row-desc">${it.desc}</div>
        </div>
        <div class="freq-g" id="fg-${it.key}">${fb}</div>
        <label class="sw" style="margin-left:12px">
          <input type="checkbox" ${it.en?'checked':''} onchange="toggleSub('${it.key}',this.checked)">
          <span class="sw-sl"></span>
        </label>
      </div>`;
    });
    h+='</div>';
  });
  h+=`<div class="sub-save-row"><button class="save-btn" onclick="saveSub(this)">保存设置</button></div>`;
  document.getElementById('sub-content').innerHTML=h;
}

function toggleSub(key,val){
  SUB.forEach(g=>g.items.forEach(it=>{
    if(it.key===key){
      it.en=val;
      document.getElementById('fg-'+key)?.querySelectorAll('.freq-b').forEach(b=>b.classList.toggle('dis',!val));
    }
  }));
}

function setFreq(key,freq,btn){
  SUB.forEach(g=>g.items.forEach(it=>{if(it.key===key)it.freq=freq;}));
  document.getElementById('fg-'+key)?.querySelectorAll('.freq-b').forEach(b=>b.classList.remove('on'));
  btn.classList.add('on');
}

function saveSub(btn){
  btn.textContent='已保存 ✓';btn.style.background='var(--green)';
  setTimeout(()=>{btn.textContent='保存设置';btn.style.background='';},1600);
}

/* ═══════════════════════════
   INIT
═══════════════════════════ */
goSec('msg');
</script>
</body>
</html>
