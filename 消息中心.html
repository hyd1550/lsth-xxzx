<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>工作台 · 消息通知中心</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#fff;
  --bg2:#f7f7f5;
  --bg3:#f0efe9;
  --t1:#1a1a18;
  --t2:#5a5a56;
  --t3:#9a9a94;
  --bd:rgba(0,0,0,0.09);
  --bd2:rgba(0,0,0,0.15);
  --blue:#185FA5;
  --blue-bg:#E6F1FB;
  --blue-t:#0C447C;
  --red:#E24B4A;
  --red-bg:#FCEBEB;
  --red-t:#A32D2D;
  --orange:#EF9F27;
  --orange-bg:#FAEEDA;
  --orange-t:#854F0B;
  --green:#1D9E75;
  --green-bg:#E1F5EE;
  --green-t:#0F6E56;
  --purple:#7F77DD;
  --purple-bg:#EEEDFE;
  --purple-t:#534AB7;
  --r4:4px;--r6:6px;--r8:8px;
}
body{font-family:'PingFang SC','Microsoft YaHei',sans-serif;background:#fff;height:100vh;overflow:hidden}
.layout{display:flex;height:100vh;overflow:hidden}

/* 左侧 */
.sidebar{width:180px;border-right:1px solid var(--bd);display:flex;flex-direction:column;padding:20px 0 0;background:#fff;flex-shrink:0}
.sec-title{font-size:12px;font-weight:600;color:var(--t1);padding:0 16px 10px}
.nav-item{display:flex;align-items:center;gap:9px;padding:7px 16px;cursor:pointer;font-size:13px;color:var(--t2);position:relative;transition:color 0.12s}
.nav-item:hover{color:var(--t1)}
.nav-item.active{color:var(--t1);font-weight:600}
.dot{width:9px;height:9px;border-radius:50%;flex-shrink:0}
.dot-gray{background:#888780}
.dot-coral{background:#D85A30}
.dot-amber{background:#EF9F27}
.dot-green{background:#1D9E75}
.dot-purple{background:#7F77DD}
.dot-blue{background:#185FA5}
.nav-count{margin-left:auto;font-size:11px;font-weight:600;min-width:16px;text-align:center}
.nc-r{color:var(--red-t)}
.nc-o{color:var(--orange-t)}
.nc-b{color:var(--blue-t)}
.nc-g{color:var(--t3)}
.sidebar-gap{height:16px}
.quick-title{font-size:12px;font-weight:600;color:var(--t1);padding:0 16px 8px}
.quick-action{display:flex;align-items:center;gap:8px;padding:6px 16px;cursor:pointer;font-size:13px;color:var(--t2);transition:color 0.12s}
.quick-action:hover{color:var(--t1)}

/* 中间列表 */
.content{flex:1;display:flex;flex-direction:column;overflow:hidden;border-right:1px solid var(--bd)}
.toolbar{display:flex;align-items:center;padding:10px 16px;gap:8px;border-bottom:1px solid var(--bd);flex-shrink:0}
.search{flex:1;height:32px;border:1px solid var(--bd2);border-radius:var(--r6);padding:0 12px;font-size:13px;color:var(--t1);background:var(--bg2);outline:none;font-family:inherit;min-width:0}
.search::placeholder{color:var(--t3)}
.search:focus{border-color:var(--blue);background:#fff}
.filter-group{display:flex;gap:6px;flex-shrink:0}
.fbtn{height:30px;padding:0 12px;border:1px solid var(--bd2);border-radius:var(--r6);font-size:12px;font-weight:500;background:#fff;color:var(--t2);cursor:pointer;font-family:inherit;white-space:nowrap;transition:all 0.12s}
.fbtn:hover{border-color:var(--blue);color:var(--blue)}
.fbtn.on{background:var(--blue-bg);border-color:rgba(24,95,165,0.35);color:var(--blue-t);font-weight:600}
.list-area{flex:1;overflow-y:auto;padding:8px 10px}
.list-area::-webkit-scrollbar{width:4px}
.list-area::-webkit-scrollbar-thumb{background:var(--bd2);border-radius:2px}

/* 消息卡片 */
.card{display:flex;border-bottom:1px solid var(--bd);cursor:pointer;background:#fff;transition:background 0.1s;position:relative;padding:12px 10px 12px 0}
.card:hover{background:#fafaf8}
.card.active{background:var(--blue-bg)}
.card.unread{background:#fafaf8}
.pbar-wrap{width:28px;display:flex;justify-content:center;flex-shrink:0;padding-top:3px}
.pbar{width:3px;height:calc(100% - 24px);border-radius:2px;position:absolute;left:16px;top:12px}
.pb-h{background:var(--red)}.pb-m{background:var(--orange)}.pb-l{background:var(--blue)}
.card-left{width:28px;flex-shrink:0;display:flex;flex-direction:column;align-items:center;padding-top:2px;gap:6px}
.type-icon{width:20px;height:20px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;flex-shrink:0}
.card-body{flex:1;min-width:0}
.card-header{display:flex;align-items:flex-start;gap:6px;margin-bottom:4px}
.card-title{font-size:13px;font-weight:600;color:var(--t1);flex:1;line-height:1.45}
.card.active .card-title{color:var(--blue-t)}
.pin-badge{font-size:10px;padding:1px 5px;border-radius:3px;font-weight:600;background:var(--red-bg);color:var(--red-t);flex-shrink:0;white-space:nowrap;margin-top:2px}
.card-meta{display:flex;align-items:center;gap:6px;margin-bottom:4px}
.src-tag{font-size:11px;color:var(--t3);background:var(--bg2);padding:1px 6px;border-radius:3px;border:1px solid var(--bd)}
.card-right{width:80px;flex-shrink:0;display:flex;flex-direction:column;align-items:flex-end;gap:6px;padding-top:2px}
.ctime{font-size:11px;color:var(--t3);white-space:nowrap}
.udot{width:7px;height:7px;border-radius:50%;background:var(--blue)}
.card-sum{font-size:12px;color:var(--t2);line-height:1.55;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;margin-bottom:5px}
.dtags{display:flex;gap:5px;flex-wrap:wrap}
.dtag{font-size:11px;padding:1px 7px;border-radius:3px;font-weight:500}
.dtag-r{background:var(--red-bg);color:var(--red-t)}
.dtag-o{background:var(--orange-bg);color:var(--orange-t)}
.dtag-b{background:var(--blue-bg);color:var(--blue-t)}
.dtag-g{background:var(--green-bg);color:var(--green-t)}

/* 底部统计 */
.bottombar{height:36px;display:flex;align-items:center;padding:0 16px;border-top:1px solid var(--bd);flex-shrink:0;gap:16px}
.stat{font-size:12px;color:var(--t2)}
.stat b{font-weight:600;color:var(--t1)}
.stat-r b{color:var(--red)}

/* 右侧详情 */
.detail{width:320px;flex-shrink:0;display:flex;flex-direction:column;overflow:hidden;background:#fff}
.dp-scroll{flex:1;overflow-y:auto}
.dp-scroll::-webkit-scrollbar{width:4px}
.dp-scroll::-webkit-scrollbar-thumb{background:var(--bd2);border-radius:2px}
.dp-head{padding:16px 18px 14px;border-bottom:1px solid var(--bd)}
.dp-title-row{display:flex;align-items:flex-start;gap:8px;margin-bottom:10px}
.dp-title{font-size:15px;font-weight:700;color:var(--t1);flex:1;line-height:1.4}
.dp-badge{font-size:11px;padding:3px 9px;border-radius:4px;font-weight:600;white-space:nowrap;flex-shrink:0;margin-top:2px}
.dp-meta{font-size:11.5px;color:var(--t3);line-height:1.8}
.dp-src{font-size:11.5px;color:var(--blue);cursor:pointer}
.dp-sec{padding:13px 18px;border-bottom:1px solid var(--bd)}
.dp-label{font-size:10.5px;font-weight:700;color:var(--t3);letter-spacing:0.06em;text-transform:uppercase;margin-bottom:7px}
.dp-text{font-size:12.5px;color:var(--t2);line-height:1.65}
.dp-grid{display:grid;grid-template-columns:1fr 1fr;gap:7px}
.dp-cell{background:var(--bg2);border-radius:var(--r6);padding:8px 10px;border:1px solid var(--bd)}
.dp-clabel{font-size:10px;color:var(--t3);margin-bottom:3px;font-weight:500}
.dp-cval{font-size:13px;font-weight:700;color:var(--t1)}
.dp-advice{font-size:12px;color:var(--t2);line-height:1.65;background:var(--orange-bg);border-radius:var(--r6);padding:10px 12px;border-left:3px solid var(--orange)}
.dp-actions{padding:14px 18px;display:flex;flex-direction:column;gap:7px}
.abtn{width:100%;height:36px;border-radius:var(--r8);font-size:13px;cursor:pointer;font-weight:600;font-family:inherit;transition:all 0.15s;letter-spacing:0.02em}
.abtn-p{background:var(--blue);color:#fff;border:none}
.abtn-p:hover{background:var(--blue-t)}
.abtn-s{background:#fff;color:var(--t2);border:1px solid var(--bd2)}
.abtn-s:hover{background:var(--bg2)}
.dp-empty{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;color:var(--t3);font-size:13px;gap:12px}
.dp-empty-icon{font-size:32px;opacity:0.25}
mark{background:var(--orange-bg);color:var(--orange-t);border-radius:2px;padding:0 1px}
</style>
</head>
<body>
<div class="layout">

  <!-- 左侧 -->
  <div class="sidebar">
    <div class="sec-title">消息分类</div>
    <div class="nav-item active" onclick="filterType('all',this)">
      <span class="dot dot-gray"></span>全部消息
      <span class="nav-count nc-r" id="nc-all">12</span>
    </div>
    <div class="nav-item" onclick="filterType('PUB',this)">
      <span class="dot dot-coral"></span>舆情与品牌预警
      <span class="nav-count nc-o">3</span>
    </div>
    <div class="nav-item" onclick="filterType('MKT',this)">
      <span class="dot dot-amber"></span>竞对动态预警
      <span class="nav-count nc-o">1</span>
    </div>
    <div class="nav-item" onclick="filterType('CUS',this)">
      <span class="dot dot-green"></span>客诉信息提醒
      <span class="nav-count nc-b">2</span>
    </div>
    <div class="nav-item" onclick="filterType('RD',this)">
      <span class="dot dot-purple"></span>需求信息提醒
      <span class="nav-count nc-b">2</span>
    </div>
    <div class="nav-item" onclick="filterType('STR',this)">
      <span class="dot dot-blue"></span>战略与政策推送
      <span class="nav-count nc-b">1</span>
    </div>
    <div class="sidebar-gap"></div>
    <div class="quick-title">快速操作</div>
    <div class="quick-action" onclick="markAllRead()">✓ &nbsp;全部标记已读</div>
  </div>

  <!-- 中间 -->
  <div class="content">
    <div class="toolbar">
      <input class="search" placeholder="搜索消息..." id="searchInput" oninput="doSearch(this.value)"/>
      <div class="filter-group">
        <button class="fbtn on" id="fbtn-unread" onclick="toggleF('unread',this)">未读</button>
        <button class="fbtn" id="fbtn-high" onclick="toggleF('high',this)">高优先级</button>
        <button class="fbtn" id="fbtn-7d" onclick="toggleF('7d',this)">近7天</button>
        <button class="fbtn" onclick="markAllRead()">批量已读</button>
      </div>
    </div>
    <div class="list-area" id="listPanel"></div>
    <div class="bottombar">
      <div class="stat">总消息 <b id="totalCount">12</b></div>
      <div class="stat stat-r">未读 <b id="unreadCount">6</b></div>
      <div class="stat">今日新增 <b id="todayCount">8</b></div>
    </div>
  </div>

  <!-- 右侧详情 -->
  <div class="detail" id="detailPanel">
    <div class="dp-empty">
      <div class="dp-empty-icon">📋</div>
      <div>点击消息查看详情</div>
    </div>
  </div>
</div>

const typeColor={PAT:'#E24B4A',PUB:'#D85A30',MKT:'#EF9F27',CUS:'#1D9E75',RD:'#7F77DD',STR:'#185FA5',SYS:'#888780'};
const typeBg={PAT:'#FCEBEB',PUB:'#FAECE7',MKT:'#FAEEDA',CUS:'#E1F5EE',RD:'#EEEDFE',STR:'#E6F1FB',SYS:'#F1EFE8'};
const typeEmoji={PAT:'⚖',PUB:'📡',MKT:'📈',CUS:'💬',RD:'🔬',STR:'🏛',SYS:'⚙'};

let curType='all',selId=null,showUnread=true,showHigh=false;
const readSet=new Set(msgs.filter(m=>!m.unread).map(m=>m.id));
const ignoredSet=new Set();

function getVisible(){
  return msgs.filter(m=>{
    if(ignoredSet.has(m.id))return false;
    if(curType!=='all'&&m.type!==curType)return false;
    if(showUnread&&readSet.has(m.id))return false;
    if(showHigh&&m.p!=='high')return false;
    return true;
  });
}

function renderList(list){
  list=list||getVisible();
  const panel=document.getElementById('listPanel');
  if(!list.length){panel.innerHTML='<div style="text-align:center;padding:60px 0;color:#9a9a94;font-size:13px">暂无消息</div>';return;}
  panel.innerHTML=list.map(m=>{
    const isU=!readSet.has(m.id),isSel=m.id===selId;
    const col=typeColor[m.type]||'#888780';
    const bg=typeBg[m.type]||'#F1EFE8';
    const em=typeEmoji[m.type]||'📌';
    const tagHtml=m.tags.map(t=>`<span class="dtag dtag-${t.c}">${t.l}</span>`).join('');
    return `<div class="card${isU?' unread':''}${isSel?' active':''}" style="padding-left:24px" onclick="selMsg(${m.id})">
      <div class="pbar pb-${m.p[0]}"></div>
      <div class="card-left">
        <div class="type-icon" style="background:${bg};color:${col}">${em}</div>
      </div>
      <div class="card-body">
        <div class="card-header">
          <div class="card-title">${m.title}</div>
          ${m.pin?'<span class="pin-badge">置顶</span>':''}
        </div>
        <div class="card-meta">
          <span class="src-tag">${m.src}</span>
        </div>
        <div class="card-sum">${m.sum}</div>
        <div class="dtags">${tagHtml}</div>
      </div>
      <div class="card-right">
        <span class="ctime">${m.time}</span>
        ${isU?'<span class="udot"></span>':''}
      </div>
    </div>`;
  }).join('');
  updateStats();
}

function selMsg(id){
  selId=id;readSet.add(id);
  const m=msgs.find(x=>x.id===id),d=m.det;
  const col=typeColor[m.type]||'#888780';
  const bg=typeBg[m.type]||'#F1EFE8';
  const pLabel=m.p==='high'?'高优先级':m.p==='mid'?'中优先级':'低优先级';
  const pCls=m.p==='high'?'dtag-r':m.p==='mid'?'dtag-o':'dtag-b';
  document.getElementById('detailPanel').innerHTML=`
    <div class="dp-scroll">
      <div class="dp-head">
        <div class="dp-title-row">
          <div class="dp-title">${m.title}</div>
          <span class="dp-badge ${pCls}">${pLabel}</span>
        </div>
        <div class="dp-meta">${m.exact}</div>
        <div class="dp-src">${m.src}</div>
      </div>
      <div class="dp-sec">
        <div class="dp-label">消息详情</div>
        <div class="dp-text">${d.desc}</div>
      </div>
      <div class="dp-sec">
        <div class="dp-label">关联数据</div>
        <div class="dp-grid">${d.data.map(x=>`<div class="dp-cell"><div class="dp-clabel">${x.l}</div><div class="dp-cval">${x.v}</div></div>`).join('')}</div>
      </div>
      <div class="dp-sec">
        <div class="dp-label">处置建议</div>
        <div class="dp-advice">${d.advice}</div>
      </div>
      <div class="dp-actions">
        <button class="abtn abtn-p">去处理 ↗</button>
        <button class="abtn abtn-s" onclick="ignoreMsg(${m.id})">忽略此消息</button>
        <button class="abtn abtn-s" onclick="markRead(${m.id})">标记已读</button>
      </div>
    </div>`;
  renderList();
}

function ignoreMsg(id){
  ignoredSet.add(id);selId=null;
  document.getElementById('detailPanel').innerHTML='<div class="dp-empty"><div class="dp-empty-icon">📋</div><div>点击消息查看详情</div></div>';
  renderList();
}
function markRead(id){readSet.add(id);renderList();}
function markAllRead(){msgs.forEach(m=>readSet.add(m.id));renderList();}
function filterType(type,el){
  curType=type;
  document.querySelectorAll('.nav-item').forEach(x=>x.classList.remove('active'));
  el.classList.add('active');renderList();
}
function toggleF(key,btn){
  if(key==='unread'){showUnread=!showUnread;btn.classList.toggle('on',showUnread);}
  if(key==='high'){showHigh=!showHigh;btn.classList.toggle('on',showHigh);}
  renderList();
}
function doSearch(q){
  if(!q){renderList();return;}
  const lq=q.toLowerCase();
  const list=getVisible().filter(m=>m.title.toLowerCase().includes(lq)||m.sum.toLowerCase().includes(lq));
  const re=new RegExp(q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&'),'gi');
  const panel=document.getElementById('listPanel');
  if(!list.length){panel.innerHTML='<div style="text-align:center;padding:60px 0;color:#9a9a94;font-size:13px">未找到相关消息</div>';return;}
  panel.innerHTML=list.map(m=>{
    const isU=!readSet.has(m.id),isSel=m.id===selId;
    const col=typeColor[m.type]||'#888780';
    const bg=typeBg[m.type]||'#F1EFE8';
    const em=typeEmoji[m.type]||'📌';
    const hl=s=>s.replace(re,t=>`<mark>${t}</mark>`);
    const tagHtml=m.tags.map(t=>`<span class="dtag dtag-${t.c}">${t.l}</span>`).join('');
    return `<div class="card${isU?' unread':''}${isSel?' active':''}" style="padding-left:24px" onclick="selMsg(${m.id})">
      <div class="pbar pb-${m.p[0]}"></div>
      <div class="card-left"><div class="type-icon" style="background:${bg};color:${col}">${em}</div></div>
      <div class="card-body">
        <div class="card-header"><div class="card-title">${hl(m.title)}</div>${m.pin?'<span class="pin-badge">置顶</span>':''}</div>
        <div class="card-meta"><span class="src-tag">${m.src}</span></div>
        <div class="card-sum">${hl(m.sum)}</div>
        <div class="dtags">${tagHtml}</div>
      </div>
      <div class="card-right"><span class="ctime">${m.time}</span>${isU?'<span class="udot"></span>':''}</div>
    </div>`;
  }).join('');
}
function updateStats(){
  const unread=msgs.filter(m=>!readSet.has(m.id)&&!ignoredSet.has(m.id)).length;
  const today=msgs.filter(m=>['今天','10分钟前','32分钟前','1小时前','2小时前','3小时前','4小时前'].includes(m.time)).length;
  document.getElementById('unreadCount').textContent=unread;
  document.getElementById('totalCount').textContent=msgs.length-ignoredSet.size;
  document.getElementById('todayCount').textContent=today;
}
renderList();
</script>
